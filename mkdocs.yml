# ────────────────────────────────────────────────────────────
# MkDocs Material 站点配置
# 源文件：《AI 时代的 SRE 架构师之路》v1.3.3
# 目标：在线阅读站点
#
# 重要：MkDocs 要求 docs_dir ≠ mkdocs.yml 所在目录。
# 解法：把所有源 Markdown 通过 symlink 影射到 docs/（一次性），
# 源文件位置不变。执行 build-site.sh 会自动建立 symlinks。
# ────────────────────────────────────────────────────────────

site_name: AI 时代的 SRE 架构师之路
site_description: 写给不被 AI 替代、且能与算法工程师并肩的 SRE
site_author: SRE to AI SRE Learning Project
site_url: ""

# docs_dir 是一个 symlink 树（见 build/setup-symlinks.sh），
# 物理源文件仍在书根
docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式

  font:
    # 英文字体（中文由 CSS override 接管，见 overrides/stylesheets/extra.css）
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  # 标准
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: 锚点链接
      toc_depth: 4

  # PyMdown Extensions（pymdown-extensions）
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

# 预处理钩子：把 GitHub `> [!NOTE]` 映射为 MkDocs `!!! note`
hooks:
  - hooks/github_callouts.py

plugins:
  - search:
      lang:
        - zh
        - en

extra:
  version:
    provider: mike
    default: v1.3.3
  social:
    - icon: fontawesome/solid/book
      link: ""
      name: 源 Markdown

copyright: >
  《AI 时代的 SRE 架构师之路》 · v1.3.3 · 2026-05-24 ·
  源 Markdown 在本项目根目录；本站点仅为阅读呈现层。

